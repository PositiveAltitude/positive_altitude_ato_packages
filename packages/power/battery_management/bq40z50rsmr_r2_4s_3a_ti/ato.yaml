requires-atopile: "0.15.4"

paths:
  src: ./
  layout: ./layouts

builds:
  default:
    entry: "bq40z50rsmr_r2_4s_3a_ti.ato:BQ40Z50BatteryFrontend4S"
  example:
    entry: "example.ato:Example"

package:
  identifier: "local/power-battery-management-bq40z50rsmr-r2-4s-3a-ti"
  version: "0.0.1"
  summary: "BQ40Z50-R2-based 4S protected smart-battery frontend for up to 3 A continuous pack current, with internal balancing support, fixed no-thermistor biasing, SMBus telemetry, and BTP interrupt output."
